<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Inscription - Banque RP</title>

  <link rel="stylesheet" href="/css/style.css"/>
  <link rel="stylesheet" href="/css/components.css"/>
  <link rel="stylesheet" href="/css/auth.css"/>

  <script src="/js/theme.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
</head>

<body>

<script>
  // Redirection si déjà connecté
  (async () => {
    try {
      const res = await fetch('/api/auth/me');
      if (res.ok) window.location.href = '/dashboard.html';
    } catch (e) {}
  })();
</script>

<main class="auth-page">

  <div class="auth-container">

    <div class="auth-card">

      <h1>Créer un compte</h1>

      <input id="username" placeholder="Username" />
      <input id="email" placeholder="Email" />
      <input id="displayName" placeholder="Nom affiché" />

      <input id="password" type="password" placeholder="Mot de passe" />
      <input id="confirmPassword" type="password" placeholder="Confirmer mot de passe" />

      <div class="password-strength">
        <div id="strengthBar"></div>
      </div>

      <button onclick="register()">S’inscrire</button>

      <p class="auth-link">
        Déjà un compte ? <a href="/login.html">Connexion</a>
      </p>

      <p id="error" class="error-text"></p>

    </div>

  </div>

</main>

</body>
</html>
