<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard - Banque RP</title>

  <link rel="stylesheet" href="/css/style.css"/>
  <link rel="stylesheet" href="/css/components.css"/>
  <link rel="stylesheet" href="/css/dashboard.css"/>

  <script src="/js/theme.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/dashboard.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="app-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <div class="sidebar-header">
      <h2>Banque RP</h2>
    </div>

    <nav class="sidebar-nav">
      <a href="/dashboard.html" class="active">Dashboard</a>
      <a href="/transfer.html">Virement</a>
      <a href="/history.html">Historique</a>
      <a href="/search.html">Recherche</a>
      <a href="/tpe.html">TPE</a>
      <a href="/employee.html">Employé</a>
      <a href="/admin.html">Admin</a>
      <a href="/profile.html">Profil</a>
    </nav>

    <button onclick="API.auth.logout().then(()=>location='/login.html')">
      Déconnexion
    </button>

  </aside>

  <!-- MAIN -->
  <main class="main-content">

    <!-- TOPBAR -->
    <header class="topbar">

      <h1>Dashboard</h1>

      <div class="topbar-actions">
        <button onclick="toggleTheme()">🌓</button>
      </div>

    </header>

    <!-- CONTENT -->
    <section class="page-content">

      <!-- BALANCE CARD -->
      <div class="balance-card">

        <h2>Solde</h2>
        <div id="balanceAmount">0,00 €</div>

        <p>IBAN : <span id="iban">-</span></p>

        <button onclick="location.href='/transfer.html'">
          Faire un virement
        </button>

      </div>

      <!-- STATS -->
      <div class="stats-grid">

        <div class="stat-card">
          <p>Reçus</p>
          <span id="received">0 €</span>
        </div>

        <div class="stat-card">
          <p>Envoyés</p>
          <span id="sent">0 €</span>
        </div>

        <div class="stat-card">
          <p>Transactions</p>
          <span id="txCount">0</span>
        </div>

      </div>

      <!-- CHART -->
      <div class="chart-container">
        <canvas id="chart"></canvas>
      </div>

      <!-- LAST TRANSACTIONS -->
      <div class="card">

        <h3>Dernières transactions</h3>

        <div id="lastTransactions"></div>

      </div>

    </section>

  </main>

</div>

</body>
</html>
