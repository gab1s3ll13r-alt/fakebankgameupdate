<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recherche - Banque RP</title>

  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/dashboard.css" />

  <script src="/js/theme.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/dashboard.js"></script>
  <script src="/js/search.js"></script>
</head>

<body>

<div class="app-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <div class="sidebar-header">
      <h2>Banque RP</h2>
    </div>

    <nav class="sidebar-nav">
      <a href="/dashboard.html">Dashboard</a>
      <a href="/transfer.html">Virement</a>
      <a href="/history.html">Historique</a>
      <a href="/search.html" class="active">Recherche</a>
      <a href="/tpe.html" id="tpeLink">TPE</a>
      <a href="/employee.html" id="employeeLink">Employé</a>
      <a href="/admin.html" id="adminLink">Admin</a>
      <a href="/profile.html">Profil</a>
    </nav>

    <div class="sidebar-footer">
      <button onclick="API.auth.logout().then(()=>location.href='/login.html')">
        Déconnexion
      </button>
    </div>

  </aside>

  <!-- MAIN -->
  <main class="main-content">

    <!-- TOPBAR -->
    <header class="topbar">

      <h1>Recherche</h1>

      <div class="topbar-actions">
        <button onclick="toggleTheme()">🌓</button>
      </div>

    </header>

    <!-- CONTENT -->
    <section class="page-content">

      <!-- SEARCH INPUT -->
      <div class="search-bar">
        <input 
          type="text" 
          id="searchInput"
          placeholder="Rechercher un utilisateur..."
        />
      </div>

      <!-- RESULTS -->
      <div id="resultsContainer" class="search-results">
        <!-- JS injecte les résultats ici -->
      </div>

      <!-- EMPTY STATE -->
      <div id="emptyState" class="empty-state">
        <p>Commence une recherche pour trouver un utilisateur</p>
      </div>

    </section>

  </main>

</div>

</body>
</html>
