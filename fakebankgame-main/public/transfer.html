<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Virement - Banque RP</title>

  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/dashboard.css" />

  <script src="/js/theme.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/dashboard.js"></script>
  <script src="/js/transfer.js"></script>
</head>

<body>

<div class="app-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <div class="sidebar-header">
      <h2>Banque RP</h2>
    </div>

    <nav class="sidebar-nav">
      <a href="/dashboard.html">Dashboard</a>
      <a href="/transfer.html" class="active">Virement</a>
      <a href="/history.html">Historique</a>
      <a href="/search.html">Recherche</a>
      <a href="/tpe.html" id="tpeLink">TPE</a>
      <a href="/employee.html" id="employeeLink">Employé</a>
      <a href="/admin.html" id="adminLink">Admin</a>
      <a href="/profile.html">Profil</a>
    </nav>

    <div class="sidebar-footer">
      <button onclick="API.auth.logout().then(()=>location.href='/login.html')">
        Déconnexion
      </button>
    </div>

  </aside>

  <!-- MAIN -->
  <main class="main-content">

    <!-- TOPBAR -->
    <header class="topbar">

      <h1>Virement</h1>

      <div class="topbar-actions">
        <button onclick="toggleTheme()">🌓</button>
      </div>

    </header>

    <!-- CONTENT -->
    <section class="page-content">

      <div class="transfer-card">

        <h2>Nouveau virement</h2>

        <!-- SOLDE -->
        <div class="balance-mini">
          Solde disponible : <span id="currentBalance">0 €</span>
        </div>

        <!-- RECHERCHE DESTINATAIRE -->
        <div class="form-group">
          <label>Destinataire</label>
          <input type="text" id="recipientSearch" placeholder="Nom ou IBAN" />
          <div class="search-results" id="searchResults"></div>
        </div>

        <!-- DESTINATAIRE SELECTIONNE -->
        <div class="recipient-card" id="recipientCard" style="display:none;">
          <p>Destinataire sélectionné :</p>
          <div id="recipientInfo"></div>
          <button onclick="clearRecipient()">Retirer</button>
        </div>

        <!-- MONTANT -->
        <div class="form-group">
          <label>Montant (€)</label>
          <input type="number" id="amount" min="0.01" step="0.01" />
        </div>

        <!-- DESCRIPTION -->
        <div class="form-group">
          <label>Description</label>
          <input type="text" id="description" maxlength="200" />
        </div>

        <!-- APERCU -->
        <div class="transfer-preview" id="preview"></div>

        <!-- BTN -->
        <button class="btn primary" id="confirmTransferBtn">
          Confirmer le virement
        </button>

      </div>

    </section>

  </main>

</div>

</body>
</html>
