<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profil - Banque RP</title>

  <link rel="stylesheet" href="/css/style.css"/>
  <link rel="stylesheet" href="/css/components.css"/>
  <link rel="stylesheet" href="/css/dashboard.css"/>

  <script src="/js/theme.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/dashboard.js"></script>
</head>

<body>

<div class="app-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <div class="sidebar-header">
      <h2>Banque RP</h2>
    </div>

    <nav class="sidebar-nav">
      <a href="/dashboard.html">Dashboard</a>
      <a href="/transfer.html">Virement</a>
      <a href="/history.html">Historique</a>
      <a href="/search.html">Recherche</a>
      <a href="/tpe.html">TPE</a>
      <a href="/employee.html">Employé</a>
      <a href="/admin.html">Admin</a>
      <a href="/profile.html" class="active">Profil</a>
    </nav>

    <button onclick="API.auth.logout().then(()=>location='/login.html')">
      Déconnexion
    </button>

  </aside>

  <!-- MAIN -->
  <main class="main-content">

    <!-- TOPBAR -->
    <header class="topbar">
      <h1>Profil</h1>
      <button onclick="toggleTheme()">🌓</button>
    </header>

    <!-- CONTENT -->
    <section class="page-content">

      <!-- HEADER PROFILE -->
      <div class="profile-card">

        <div class="profile-avatar" id="avatar">U</div>

        <div class="profile-info">
          <h2 id="displayName">Utilisateur</h2>
          <p id="username">@username</p>
          <span id="roleBadge" class="role-badge">user</span>
        </div>

      </div>

      <!-- INFOS COMPTE -->
      <div class="card">

        <h3>Informations</h3>

        <p>IBAN : <span id="iban">-</span></p>
        <p>Banque : Banque RP</p>
        <p>Créé le : <span id="createdAt">-</span></p>

      </div>

      <!-- EDIT PROFIL -->
      <div class="card">

        <h3>Modifier profil</h3>

        <input id="newDisplayName" placeholder="Nom affiché" />
        <input id="newEmail" placeholder="Email" />

        <button onclick="updateProfile()">
          Sauvegarder
        </button>

      </div>

      <!-- PASSWORD -->
      <div class="card">

        <h3>Changer mot de passe</h3>

        <input id="currentPassword" type="password" placeholder="Ancien mot de passe" />
        <input id="newPassword" type="password" placeholder="Nouveau mot de passe" />
        <input id="confirmPassword" type="password" placeholder="Confirmer" />

        <button onclick="changePassword()">
          Mettre à jour
        </button>

      </div>

      <!-- TPE INFO -->
      <div class="card" id="tpeSection" style="display:none;">
        <h3>TPE</h3>
        <p>Libellé : <span id="tpeLabel"></span></p>
        <a href="/tpe.html">Accéder au mode TPE</a>
      </div>

    </section>

  </main>

</div>

</body>
</html>
