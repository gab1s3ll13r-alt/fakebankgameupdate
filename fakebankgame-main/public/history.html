<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Historique - Banque RP</title>

  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/dashboard.css" />

  <script src="/js/theme.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/dashboard.js"></script>
  <script src="/js/history.js"></script>
</head>

<body>

<div class="app-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <div class="sidebar-header">
      <h2>Banque RP</h2>
    </div>

    <nav class="sidebar-nav">
      <a href="/dashboard.html">Dashboard</a>
      <a href="/transfer.html">Virement</a>
      <a href="/history.html" class="active">Historique</a>
      <a href="/search.html">Recherche</a>
      <a href="/tpe.html" id="tpeLink">TPE</a>
      <a href="/employee.html" id="employeeLink">Employé</a>
      <a href="/admin.html" id="adminLink">Admin</a>
      <a href="/profile.html">Profil</a>
    </nav>

    <div class="sidebar-footer">
      <button onclick="API.auth.logout().then(()=>location.href='/login.html')">
        Déconnexion
      </button>
    </div>

  </aside>

  <!-- MAIN -->
  <main class="main-content">

    <!-- TOPBAR -->
    <header class="topbar">

      <h1>Historique</h1>

      <div class="topbar-actions">
        <button onclick="toggleTheme()">🌓</button>
      </div>

    </header>

    <!-- CONTENT -->
    <section class="page-content">

      <!-- FILTRES -->
      <div class="history-filters">
        <button data-type="all">Tout</button>
        <button data-type="transfer">Virements</button>
        <button data-type="tpe_payment">TPE</button>
        <button data-type="manual">Manuel</button>
      </div>

      <!-- TABLE -->
      <div class="table-wrapper">
        <table class="table" id="transactionsTable">
          <thead>
            <tr>
              <th>Type</th>
              <th>Description</th>
              <th>Date</th>
              <th>Montant</th>
            </tr>
          </thead>
          <tbody id="transactionsBody">
          </tbody>
        </table>
      </div>

      <!-- PAGINATION -->
      <div class="pagination">
        <button id="prevPage">Précédent</button>
        <span id="pageInfo">Page 1</span>
        <button id="nextPage">Suivant</button>
      </div>

    </section>

  </main>

</div>

</body>
</html>
