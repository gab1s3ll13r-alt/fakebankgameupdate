<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion - Banque RP</title>

  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/auth.css" />

  <script src="/js/theme.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
</head>

<body>
  <div class="auth-page">

    <div class="auth-container">

      <div class="auth-header">
        <h1>Banque RP</h1>
        <p>Connexion à ton compte</p>
      </div>

      <div class="auth-card">

        <form id="loginForm">

          <div class="form-group">
            <label>Identifiant</label>
            <input type="text" name="identifier" required />
          </div>

          <div class="form-group">
            <label>Mot de passe</label>
            <input type="password" name="password" id="password" required />
            <button type="button" onclick="togglePassword()">👁</button>
          </div>

          <div class="auth-error" id="loginError"></div>

          <button type="submit" class="btn primary">Se connecter</button>

        </form>

        <div class="auth-links">
          <a href="/register.html">Créer un compte</a>
        </div>

      </div>

      <div class="auth-disclaimer">
        Simulation bancaire RP — aucun argent réel
      </div>

    </div>

    <button class="theme-btn" onclick="toggleTheme()">🌓</button>

  </div>
</body>
</html>
