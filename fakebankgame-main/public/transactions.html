<h2>Historique</h2>
<div id="list"></div>

<script type="module">
import { TxAPI } from "/assets/api.js";

async function load() {
  const data = await TxAPI.history();

  document.getElementById("list").innerHTML =
    data.transactions.map(t => `
      <div class="card">
        <b>${t.type}</b><br>
        ${t.amount / 100} €<br>
        ${t.description}<br>
        <small>${t.createdAt}</small>
      </div>
    `).join("");
}

load();
</script>
